<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mamma Tomato | Acceso restringido</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <style>
    .denied {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    /* Halo de marca muy tenue detras de la tarjeta, sin distraer. */
    .denied::before {
      content: "";
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(46, 139, 79, 0.10), transparent 62%);
      filter: blur(6px);
      z-index: 0;
    }
    .denied-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: 40px 36px;
      text-align: center;
    }
    .denied-art {
      width: 96px;
      height: 96px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 24px;
      background: var(--red-50);
      color: var(--red);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7), 0 8px 22px rgba(220, 38, 38, 0.14);
    }
    .denied-art svg { width: 52px; height: 52px; }
    .denied-code {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--red);
      background: var(--red-50);
      border: 1px solid #fecaca;
      border-radius: 999px;
      padding: 4px 12px;
      margin-bottom: 14px;
    }
    .denied-card h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .denied-card p { line-height: 1.55; }
    .denied-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 26px;
      flex-wrap: wrap;
    }
    .denied-user {
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 12.5px;
    }
    .denied-user strong { color: var(--text); font-weight: 700; }
  </style>
</head>
<body>
  <div class="denied">
    <div class="card denied-card">

      <div class="denied-art" aria-hidden="true">
        <!-- Porcion de pizza con candado: misma familia de line-icons del login. -->
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor"
             stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
          <path d="M32 7 L53 49 Q32 57 11 49 Z"></path>
          <path d="M14 43 Q32 49 50 43"></path>
          <circle cx="26" cy="29" r="2.6"></circle>
          <circle cx="37" cy="37" r="2.6"></circle>
          <line x1="12" y1="12" x2="52" y2="52"></line>
        </svg>
      </div>

      <span class="denied-code">ERROR 403</span>
      <h1>Acceso restringido</h1>
      <p class="muted">
        Tu rol no tiene permiso para entrar a esta seccion del sistema.
        Si crees que deberias tener acceso, contacta al administrador.
      </p>

      <div class="denied-actions">
        <a class="btn btn-primary" th:href="@{/}">Volver a mi inicio</a>
        <a class="btn btn-ghost" th:href="@{/login}">Ir al login</a>
      </div>

      <div class="denied-user muted" th:if="${#authentication != null and #authentication.name != 'anonymousUser'}">
        Sesion iniciada como <strong th:text="${#authentication.name}">usuario</strong>
      </div>

    </div>
  </div>
</body>
</html>
