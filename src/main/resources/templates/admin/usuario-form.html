<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<main layout:fragment="content">

  <div class="toolbar">
    <div class="page-head">
      <p class="muted" th:text="${editId == null}
            ? 'Cuenta de acceso al sistema. Vincula un empleado para mostrar su nombre.'
            : 'Deja la contrasena vacia para conservar la actual.'">Ayuda</p>
    </div>
    <a class="btn btn-ghost" th:href="@{/admin/usuarios}"><i class="bi bi-arrow-left"></i> Volver</a>
  </div>

  <form class="card form-panel" id="usuarioForm" th:object="${usuarioForm}" method="post"
        th:data-nuevo="${editId == null}"
        th:action="${editId == null} ? @{/admin/usuarios} : @{/admin/usuarios/{id}(id=${editId})}">
    <div class="form-grid">
      <label class="field">Nombre de usuario
        <input type="text" th:field="*{username}" placeholder="lramos" maxlength="10" autocomplete="off"
               th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
        <span class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
      </label>

      <label class="field">Contrasena
        <input type="password" th:field="*{password}" autocomplete="new-password"
               th:placeholder="${editId == null} ? 'Minimo 6 caracteres' : 'Vacia = no cambia'"
               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
        <span class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
      </label>

      <label class="field">Rol
        <select id="rolSelect" th:field="*{idRol}" th:classappend="${#fields.hasErrors('idRol')} ? 'is-invalid'">
          <option value="">Seleccione...</option>
          <option th:each="r : ${roles}" th:value="${r.idRol}" th:text="${r.nombre}">Rol</option>
        </select>
        <span class="invalid-feedback" th:if="${#fields.hasErrors('idRol')}" th:errors="*{idRol}"></span>
      </label>

      <label class="field">Empleado vinculado
        <select th:field="*{idEmpleado}">
          <option value="">Sin vincular</option>
          <option th:each="e : ${empleados}" th:value="${e.idEmpleado}"
                  th:text="${e.nombre} + ' ' + ${e.apellido} + ' (' + ${e.cargo} + ')'">Empleado</option>
        </select>
      </label>

      <div class="field">
        <span>Estado de la cuenta</span>
        <div class="switch-row">
          <label class="estado-switch">
            <input type="checkbox" th:field="*{estado}">
            <span class="estado-slider"></span>
          </label>
          <span class="switch-text">Cuenta activa</span>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <a class="btn btn-ghost" th:href="@{/admin/usuarios}">Cancelar</a>
      <button class="btn btn-primary" type="submit">
        <i class="bi bi-check-lg"></i>
        <span th:text="${editId == null} ? 'Guardar usuario' : 'Guardar cambios'">Guardar</span>
      </button>
    </div>
  </form>

  <!-- Cambio 6: confirmacion de identidad al crear un Administrador -->
  <div id="confirmAdminModal" class="lock-overlay hidden" aria-hidden="true">
    <div class="lock-modal">
      <div class="lock-avatar" style="background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%)">
        <i class="bi bi-shield-lock"></i>
      </div>
      <h3 class="lock-title">Crear Administrador</h3>
      <p class="lock-subtitle">Estas a punto de crear un usuario con permisos de
        <strong>Administrador</strong>. Confirma tu identidad para continuar.</p>
      <input type="password" id="adminConfirmPassword" class="lock-input"
             placeholder="Tu contrasena actual" autocomplete="current-password">
      <p id="adminConfirmError" class="lock-error hidden">Contrasena incorrecta.</p>
      <div class="lock-actions">
        <button type="button" class="lock-btn secondary" id="adminConfirmCancel">Cancelar</button>
        <button type="button" class="lock-btn" id="adminConfirmBtn">Confirmar y crear</button>
      </div>
    </div>
  </div>
</main>

<th:block layout:fragment="scripts">
  <script th:src="@{/js/usuario-admin-guard.js}"></script>
</th:block>
</body>
</html>
