<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<main layout:fragment="content">
  <div class="toolbar">
    <div class="page-head">
      <p class="muted">Entradas y salidas de cada insumo con el stock resultante.</p>
    </div>
    <form class="d-flex gap-2 flex-nowrap align-items-center" method="get" th:action="@{/admin/kardex}">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="search" name="q" th:value="${filtroQ}" placeholder="Buscar por insumo..." autocomplete="off">
      </div>
      <button class="btn btn-secondary" type="submit"><i class="bi bi-funnel"></i> Filtrar</button>
    </form>
  </div>
  <div class="card table-card">
    <table>
      <thead><tr><th>Fecha</th><th>Insumo</th><th>Documento</th><th>Tipo</th><th>Entrada</th><th>Salida</th><th>Stock resultante</th></tr></thead>
      <tbody>
        <tr th:each="k : ${kardex}" th:with="entrada=${k.movimiento.tipoMovimiento.operacion == 'Entrada'}">
          <td th:text="${k.movimiento.fecha}">2026-01-01</td>
          <td th:text="${k.insumo.nombre}">Insumo</td>
          <td th:text="${k.movimiento.documento}">DOC</td>
          <td th:text="${k.movimiento.tipoMovimiento.descripcion}">Tipo</td>
          <td class="text-right" th:text="${entrada ? #numbers.formatDecimal(k.cantidad,1,3) : '-'}">-</td>
          <td class="text-right" th:text="${entrada ? '-' : #numbers.formatDecimal(k.cantidad,1,3)}">-</td>
          <td class="text-right" th:text="${k.stockResultante != null ? #numbers.formatDecimal(k.stockResultante,1,3) : '-'}">-</td>
        </tr>
        <tr th:if="${#lists.isEmpty(kardex)}" data-empty>
          <td colspan="7"><div class="empty-state">No hay movimientos de inventario que coincidan con el filtro.</div></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div th:replace="~{layout/fragments :: pager(${page}, ${baseUrl}, ${query})}"></div>
</main>
</body>
</html>
