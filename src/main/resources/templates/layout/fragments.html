<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modalEliminar(entidad, aviso)" class="modal fade" id="confirmarEliminar" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" th:text="'Eliminar ' + ${entidad}">Eliminar</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <p>Se eliminara <strong id="eliminarNombre">el registro</strong> de forma permanente.
           <span th:text="${aviso}">Si tiene registros asociados, la operacion sera rechazada.</span></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-bs-dismiss="modal">Cancelar</button>
        <form id="eliminarForm" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button class="btn btn-danger" type="submit"><i class="bi bi-trash"></i> Eliminar</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('confirmarEliminar').addEventListener('show.bs.modal', (event) => {
      const origen = event.relatedTarget;
      document.getElementById('eliminarForm').action = origen.dataset.action;
      document.getElementById('eliminarNombre').textContent = origen.dataset.nombre;
    });
  </script>
</div>

<!-- Paginador server-side reutilizable. query = sufijo "&k=v" con los filtros activos. -->
<nav th:fragment="pager(page, baseUrl, query)"
     th:if="${page != null and page.totalPages > 1}"
     class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-3"
     aria-label="Paginacion">
  <span class="muted"
        th:text="'Pagina ' + (${page.number} + 1) + ' de ' + ${page.totalPages} + ' (' + ${page.totalElements} + ' registros)'">Pagina 1 de 1</span>
  <div class="d-flex gap-1">
    <a class="btn btn-ghost btn-sm" th:classappend="${page.first} ? 'disabled'"
       th:href="@{${baseUrl}(page=0)} + ${query}" aria-label="Primera"><i class="bi bi-chevron-double-left"></i></a>
    <a class="btn btn-ghost btn-sm" th:classappend="${page.first} ? 'disabled'"
       th:href="@{${baseUrl}(page=${page.number - 1})} + ${query}" aria-label="Anterior"><i class="bi bi-chevron-left"></i></a>
    <a class="btn btn-ghost btn-sm" th:classappend="${page.last} ? 'disabled'"
       th:href="@{${baseUrl}(page=${page.number + 1})} + ${query}" aria-label="Siguiente"><i class="bi bi-chevron-right"></i></a>
    <a class="btn btn-ghost btn-sm" th:classappend="${page.last} ? 'disabled'"
       th:href="@{${baseUrl}(page=${page.totalPages - 1})} + ${query}" aria-label="Ultima"><i class="bi bi-chevron-double-right"></i></a>
  </div>
</nav>

</body>
</html>
